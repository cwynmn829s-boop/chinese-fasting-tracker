<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>断食追踪器 - v500 Luxury Emerald</title>
    <link rel="manifest" href="manifest.json?v=500">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0A0F0D">
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/svg?seed=Emerald&backgroundColor=0A0F0D&shapeColor=10B981">
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const haptic = (type = 'light') => {
            if (navigator.vibrate) {
                if (type === 'light') navigator.vibrate(10);
                else if (type === 'medium') navigator.vibrate([15, 10, 15]);
                else if (type === 'success') navigator.vibrate([20, 40, 30]);
            }
        };
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js?v=500');
        }
    </script>

    <style>
        :root {
            --bg-deep: #0A0F0D;
            --emerald-primary: #10B981;
            --emerald-glow: rgba(16, 185, 129, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #E2E8F0;
            --text-muted: #94A3B8;
            --spring-easing: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        }

        html, body {
            background-color: var(--bg-deep) !important;
            color: var(--text-main);
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        #app-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 90px;
            background: radial-gradient(circle at 50% -20%, #15221C 0%, var(--bg-deep) 100%);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            transition: transform 0.3s var(--spring-easing), border-color 0.3s;
        }

        .glass-card:active {
            transform: scale(0.98);
            border-color: rgba(16, 185, 129, 0.3);
        }

        [x-cloak] { display: none !important; }
        .tab-content {
            animation: slideUp 0.5s var(--spring-easing);
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        nav {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 400px;
            height: 64px;
            background: rgba(15, 20, 18, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            transition: 0.3s;
            flex: 1;
            background: none;
            border: none;
            outline: none;
        }

        .nav-item.active {
            color: var(--emerald-primary);
            text-shadow: 0 0 10px var(--emerald-glow);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            stroke-width: 1.5;
        }

        .timer-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 40px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--glass-border);
        }

        .timer-progress {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: 1s linear;
        }

        .timer-text {
            text-align: center;
            z-index: 2;
        }

        .timer-main {
            font-size: 48px;
            font-weight: 200;
            letter-spacing: -1px;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 24px;
        }

        @media (min-width: 768px) {
            #app-wrapper {
                flex-direction: row;
                padding-bottom: 0;
            }
            nav {
                top: 50%;
                bottom: auto;
                left: 32px;
                transform: translateY(-50%);
                width: 72px;
                height: 380px;
                flex-direction: column;
                border-radius: 36px;
            }
            .dashboard-layout {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 40px;
                align-items: start;
                padding-left: 100px;
            }
        }

        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0E1412;
            border-top: 1px solid var(--glass-border);
            border-radius: 32px 32px 0 0;
            padding: 32px 24px;
            z-index: 2001;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .drawer.open { transform: translateY(0); }

        .plan-option {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .plan-option.selected {
            border-color: var(--emerald-primary);
            background: rgba(16, 185, 129, 0.05);
        }

        .streak-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .streak-day {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: rgba(255,255,255,0.05);
        }
        .streak-day.active {
            background: var(--emerald-primary);
            box-shadow: 0 0 5px var(--emerald-glow);
        }

        input[type="number"] {
            outline: none;
            color: var(--emerald-primary);
        }
    </style>
</head>
<body x-data="fastingApp()">
    
    <div id="app-wrapper">
        
        <template x-if="tab === 'home'">
            <div class="tab-content dashboard-layout">
                <section>
                    <h1 class="text-2xl font-light mb-2">正在断食</h1>
                    <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem;">您的身体正在进入脂肪燃烧模式</p>
                    
                    <div class="timer-container" @click="haptic('medium')">
                        <div class="timer-ring"></div>
                        <svg width="280" height="280" style="position: absolute; transform: rotate(-90deg);">
                            <circle cx="140" cy="140" r="138" fill="none" stroke="var(--emerald-primary)" stroke-width="4"
                                :stroke-dasharray="867" :stroke-dashoffset="867 - (867 * progress / 100)"
                                style="filter: drop-shadow(0 0 8px var(--emerald-glow))" />
                        </svg>
                        <div class="timer-text">
                            <div style="color: var(--text-muted); font-size: 0.75rem; letter-spacing: 0.1em; margin-bottom: 0.25rem;">已持续</div>
                            <div class="timer-main" x-text="formatTime(elapsed)">00:00:00</div>
                            <div style="color: var(--emerald-primary); font-size: 0.875rem; margin-top: 0.25rem;" x-text="`目标: ${plan}h`"></div>
                        </div>
                    </div>

                    <button @click="showPicker = true; haptic('light')" class="glass-card w-full py-4 mt-8 flex items-center justify-center gap-2" style="background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main);">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem;"><path d="M12 6V12L16 14M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z"/></svg>
                        切换方案: <span x-text="`${plan}:${24-plan}`"></span>
                    </button>
                </section>

                <section class="bento-grid">
                    <div class="glass-card p-6" style="grid-column: span 2;">
                        <h3 style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1rem; letter-spacing: -0.025em; text-transform: uppercase;">身体状态</h3>
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div style="width: 3rem; height: 3rem; background: rgba(16, 185, 129, 0.1); border-radius: 9999px; display: flex; align-items: center; justify-content: center;">
                                <svg style="width: 1.5rem; height: 1.5rem; color: var(--emerald-primary);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14H11V21L20 10H13Z"/></svg>
                            </div>
                            <div>
                                <div style="font-size: 1.125rem; font-weight: 500;">酮症状态预警</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted);">预计在 2 小时后开始</div>
                            </div>
                        </div>
                    </div>
                    <div class="glass-card p-4">
                        <div style="font-size: 1.5rem; margin-bottom: 0.25rem;">🔥 42</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">本周断食时数</div>
                    </div>
                    <div class="glass-card p-4">
                        <div style="font-size: 1.5rem; margin-bottom: 0.25rem;">💧 1.2L</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">今日饮水量</div>
                    </div>
                </section>
            </div>
        </template>

        <template x-if="tab === 'journey'">
            <div class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 class="text-2xl font-light">健康旅程</h2>
                    <button @click="showWeightLog = true; haptic('light')" class="glass-card" style="padding: 0.5rem 1rem; font-size: 0.875rem; color: var(--emerald-primary); border-color: rgba(16, 185, 129, 0.3);">记录体重</button>
                </div>

                <div class="glass-card p-6 mb-6">
                    <h3 style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1rem; text-transform: uppercase;">体重趋势</h3>
                    <div style="height: 200px;">
                        <canvas id="weightChart"></canvas>
                    </div>
                </div>

                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <div class="glass-card p-4" style="display: flex; gap: 1rem; align-items: center;">
                        <div style="color: var(--emerald-primary); font-size: 1.25rem; font-weight: 700;">01</div>
                        <div>
                            <div style="font-weight: 500;">血糖下降期</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">0-4 小时 • 胰岛素水平开始回落</div>
                        </div>
                    </div>
                    <div class="glass-card p-4" style="display: flex; gap: 1rem; align-items: center; opacity: 0.5;">
                        <div style="color: var(--text-muted); font-size: 1.25rem; font-weight: 700;">02</div>
                        <div>
                            <div style="font-weight: 500;">脂肪消耗期</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">12-16 小时 • 身体开始寻找替代燃料</div>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <template x-if="tab === 'library'">
            <div class="tab-content">
                <h2 class="text-2xl font-light mb-6">断食百科</h2>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem;">
                    <div class="glass-card" style="overflow: hidden;">
                        <div style="height: 8rem; background: rgba(6, 78, 59, 0.4); display: flex; align-items: center; justify-content: center;">
                            <svg style="width: 3rem; height: 3rem; color: rgba(16, 185, 129, 0.5);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                        </div>
                        <div class="p-4">
                            <span style="font-size: 10px; background: rgba(16, 185, 129, 0.1); color: var(--emerald-primary); padding: 0.125rem 0.5rem; border-radius: 9999px; text-transform: uppercase;">深度阅读</span>
                            <h4 style="margin-top: 0.5rem; font-weight: 500;">细胞自噬：身体的自我清理</h4>
                            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem;">了解断食如何触发深层修复...</p>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <template x-if="tab === 'profile'">
            <div class="tab-content">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                    <div style="width: 4rem; height: 4rem; border-radius: 9999px; background: rgba(16, 185, 129, 0.2); border: 2px solid rgba(16, 185, 129, 0.4); display: flex; align-items: center; justify-content: center;">
                        <svg style="width: 2rem; height: 2rem; color: var(--emerald-primary);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    </div>
                    <div>
                        <h2 style="font-size: 1.25rem; font-weight: 500;">翡翠会员</h2>
                        <p style="font-size: 0.75rem; color: var(--text-muted);">已连续断食 12 天</p>
                    </div>
                </div>

                <div class="glass-card p-6 mb-6">
                    <h3 style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.1em;">活跃日历</h3>
                    <div class="streak-grid">
                        <template x-for="i in 56">
                            <div class="streak-day" :class="Math.random() > 0.6 ? 'active' : ''"></div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

    </div>

    <nav>
        <button @click="tab = 'home'; haptic('light')" class="nav-item" :class="tab === 'home' ? 'active' : ''">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12L5 10M5 10L12 3L19 10M5 10V20C5 20.5523 5.44772 21 6 21H9M19 10L21 12M19 10V20C19 20.5523 18.5523 21 18 21H15M9 21V15C9 14.4477 9.44772 14 10 14H14C14.5523 14 15 14.4477 15 15V21M9 21H15"/></svg>
            <span style="font-size: 10px;">主页</span>
        </button>
        <button @click="tab = 'journey'; haptic('light')" class="nav-item" :class="tab === 'journey' ? 'active' : ''">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
            <span style="font-size: 10px;">旅程</span>
        </button>
        <button @click="tab = 'library'; haptic('light')" class="nav-item" :class="tab === 'library' ? 'active' : ''">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            <span style="font-size: 10px;">百科</span>
        </button>
        <button @click="tab = 'profile'; haptic('light')" class="nav-item" :class="tab === 'profile' ? 'active' : ''">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span style="font-size: 10px;">我的</span>
        </button>
    </nav>

    <div x-show="showPicker" x-cloak class="drawer-overlay" @click="showPicker = false"></div>
    <div class="drawer" :class="showPicker ? 'open' : ''">
        <h3 style="text-align: center; font-size: 1.125rem; font-weight: 500; margin-bottom: 1.5rem;">选择断食方案</h3>
        <template x-for="p in [16, 18, 20, 23]">
            <div @click="plan = p; showPicker = false; haptic('success')" class="plan-option" :class="plan === p ? 'selected' : ''">
                <div>
                    <div style="font-weight: 500;" x-text="`${p}:${24-p} 方案`"></div>
                    <div style="font-size: 0.75rem; color: var(--text-muted);" x-text="`断食 ${p} 小时，饮食 ${24-p} 小时`"></div>
                </div>
                <div x-show="plan === p" style="color: var(--emerald-primary);">
                    <svg style="width: 1.5rem; height: 1.5rem;" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>
                </div>
            </div>
        </template>
    </div>

    <div x-show="showWeightLog" x-cloak class="drawer-overlay" @click="showWeightLog = false"></div>
    <div class="drawer" :class="showWeightLog ? 'open' : ''">
        <h3 style="text-align: center; font-size: 1.125rem; font-weight: 500; margin-bottom: 1.5rem;">记录体重 (kg)</h3>
        <input type="number" step="0.1" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; text-align: center; font-size: 1.875rem; margin-bottom: 1.5rem;" placeholder="70.0" x-model="tempWeight">
        <button @click="logWeight(); haptic('success')" style="width: 100%; background: var(--emerald-primary); padding: 1rem; border-radius: 1rem; font-weight: 700; color: #000; border: none;">确认记录</button>
    </div>

    <script>
        function fastingApp() {
            return {
                tab: 'home',
                plan: 16,
                elapsed: 14400,
                progress: 25,
                showPicker: false,
                showWeightLog: false,
                tempWeight: '',
                weights: [72.5, 72.2, 71.8, 71.5, 71.9, 71.2],
                
                init() {
                    setInterval(() => {
                        this.elapsed++;
                        this.progress = Math.min((this.elapsed / (this.plan * 3600)) * 100, 100);
                    }, 1000);
                    
                    this.$watch('tab', (val) => {
                        if (val === 'journey') {
                            setTimeout(() => this.initChart(), 200);
                        }
                    });
                },

                formatTime(sec) {
                    const h = Math.floor(sec / 3600).toString().padStart(2, '0');
                    const m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
                    const s = (sec % 60).toString().padStart(2, '0');
                    return `${h}:${m}:${s}`;
                },

                logWeight() {
                    if (this.tempWeight) {
                        this.weights.push(parseFloat(this.tempWeight));
                        this.showWeightLog = false;
                        if (this.tab === 'journey') this.initChart();
                    }
                },

                initChart() {
                    const ctx = document.getElementById('weightChart').getContext('2d');
                    if (window.myChart) window.myChart.destroy();
                    
                    window.myChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: this.weights.map((_, i) => `Day ${i+1}`),
                            datasets: [{
                                data: this.weights,
                                borderColor: '#10B981',
                                borderWidth: 3,
                                pointRadius: 4,
                                pointBackgroundColor: '#10B981',
                                tension: 0.4,
                                fill: true,
                                backgroundColor: (context) => {
                                    const gradient = ctx.createLinearGradient(0, 0, 0, 200);
                                    gradient.addColorStop(0, 'rgba(16, 185, 129, 0.2)');
                                    gradient.addColorStop(1, 'rgba(16, 185, 129, 0)');
                                    return gradient;
                                }
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#475569' } },
                                x: { grid: { display: false }, ticks: { display: false } }
                            }
                        }
                    });
                }
            }
        }
    </script>
</body>
</html>
