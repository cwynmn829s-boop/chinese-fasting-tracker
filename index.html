<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>断食追踪器</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { margin-bottom: 1.5rem; font-weight: 700; }
        .timer {
            font-size: 3rem;
            font-weight: 800;
            margin: 1.5rem 0;
            font-variant-numeric: tabular-nums;
        }
        .status {
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
        }
        button:hover { opacity: 0.9; }
        button.stop { background-color: #ef4444; }
        .history {
            margin-top: 2rem;
            text-align: left;
            border-top: 1px solid #e2e8f0;
            padding-top: 1rem;
        }
        .history h3 { font-size: 0.875rem; color: #64748b; margin-bottom: 0.5rem; }
        .history-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            padding: 0.25rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>断食追踪器</h1>
        <div id="status" class="status">未在断食</div>
        <div id="timer" class="timer">00:00:00</div>
        <button id="toggleBtn">开始断食</button>

        <div class="history">
            <h3>最近记录</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        let startTime = localStorage.getItem('fastStartTime');
        let history = JSON.parse(localStorage.getItem('fastHistory') || '[]');
        const timerDisplay = document.getElementById('timer');
        const statusDisplay = document.getElementById('status');
        const toggleBtn = document.getElementById('toggleBtn');
        const historyList = document.getElementById('historyList');
        let interval;

        function updateDisplay() {
            if (!startTime) {
                timerDisplay.textContent = "00:00:00";
                statusDisplay.textContent = "未在断食";
                toggleBtn.textContent = "开始断食";
                toggleBtn.className = "";
                clearInterval(interval);
                return;
            }

            const now = new Date().getTime();
            const diff = now - parseInt(startTime);
            
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            timerDisplay.textContent = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            statusDisplay.textContent = "正在断食中";
            toggleBtn.textContent = "结束断食";
            toggleBtn.className = "stop";
        }

        function renderHistory() {
            historyList.innerHTML = history.slice(-5).reverse().map(f => `
                <div class="history-item">
                    <span>${new Date(f.end).toLocaleDateString('zh-CN')}</span>
                    <span>${f.duration}</span>
                </div>
            `).join('');
        }

        toggleBtn.onclick = () => {
            if (startTime) {
                const duration = timerDisplay.textContent;
                history.push({ end: new Date().getTime(), duration });
                localStorage.setItem('fastHistory', JSON.stringify(history));
                localStorage.removeItem('fastStartTime');
                startTime = null;
                renderHistory();
            } else {
                startTime = new Date().getTime().toString();
                localStorage.setItem('fastStartTime', startTime);
                interval = setInterval(updateDisplay, 1000);
            }
            updateDisplay();
        };

        if (startTime) {
            interval = setInterval(updateDisplay, 1000);
            updateDisplay();
        }
        renderHistory();
    </script>
</body>
</html>
