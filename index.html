<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="断食计时器">
    <meta name="theme-color" content="#F2F2F7">
    <link rel="apple-touch-icon" href="/icon-512.png">
    <link rel="manifest" href="/manifest.json">
    <title>断食计时器</title>
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-group-bg: #FFFFFF;
            --ios-label: #000000;
            --ios-secondary-label: #8E8E93;
            --ios-separator: #C6C6C8;
            --ios-accent: #34C759;
            --ios-danger: #FF3B30;
            --glass: rgba(255, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        ::-webkit-scrollbar { display: none; }
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-label);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            min-height: 100vh;
        }

        .header {
            grid-column: 1 / -1;
            padding: 40px 10px 10px;
        }

        h1 {
            font-size: 38px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
        }

        @media (min-width: 900px) {
            .page-wrapper {
                grid-template-columns: 1fr 1fr;
                align-items: start;
                padding: 60px 40px;
                gap: 60px;
            }
            .header {
                padding: 0 10px 20px;
            }
            h1 { font-size: 48px; }
        }

        .main-widget {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.4);
            border-radius: 40px;
            width: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            animation: slideIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .status-pill {
            padding: 6px 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: var(--ios-secondary-label);
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .status-pill.active {
            color: var(--ios-accent);
            background: rgba(52, 199, 89, 0.1);
        }

        .timer {
            font-size: clamp(64px, 12vw, 96px);
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            margin-bottom: 40px;
            letter-spacing: -2px;
        }

        .action-btn {
            background: var(--ios-accent);
            color: white;
            border: none;
            width: 84px;
            height: 84px;
            border-radius: 42px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s, box-shadow 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(52, 199, 89, 0.3);
        }

        .action-btn:active {
            transform: scale(0.9);
        }

        .action-btn.stop {
            background: var(--ios-danger);
            box-shadow: 0 10px 25px rgba(255, 59, 48, 0.3);
        }

        .history-section {
            width: 100%;
            animation: slideIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .history-header {
            font-size: 14px;
            font-weight: 600;
            color: var(--ios-secondary-label);
            text-transform: uppercase;
            margin-bottom: 12px;
            padding-left: 16px;
            letter-spacing: 0.5px;
        }

        .history-list {
            background: var(--ios-group-bg);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .history-row-wrapper {
            position: relative;
            overflow: hidden;
            background-color: var(--ios-danger);
        }

        .history-item {
            background: var(--ios-group-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            z-index: 2;
        }

        .history-item::after {
            content: "";
            position: absolute;
            left: 20px;
            right: 0;
            bottom: 0;
            height: 0.5px;
            background-color: var(--ios-separator);
        }

        .history-row-wrapper:last-child .history-item::after {
            display: none;
        }

        .delete-btn {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 90px;
            background-color: var(--ios-danger);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 17px;
            font-weight: 600;
            z-index: 1;
        }

        .history-date {
            font-size: 19px;
            font-weight: 400;
        }

        .history-duration {
            font-size: 19px;
            font-weight: 500;
            color: var(--ios-secondary-label);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .swiped .history-item {
            transform: translateX(-90px);
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="header">
            <h1>断食计时器</h1>
        </div>

        <div class="main-widget">
            <div id="status" class="status-pill">待机中</div>
            <div id="timer" class="timer">00:00:00</div>
            <button id="toggleBtn" class="action-btn">开始</button>
        </div>

        <div class="history-section">
            <div class="history-header">最近记录</div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('SW registered:', registration);
                }).catch(error => {
                    console.log('SW registration failed:', error);
                });
            });
        }

        let startTime = localStorage.getItem('fastStartTime');
        let history = JSON.parse(localStorage.getItem('fastHistory') || '[]');
        const timerDisplay = document.getElementById('timer');
        const statusDisplay = document.getElementById('status');
        const toggleBtn = document.getElementById('toggleBtn');
        const historyList = document.getElementById('historyList');
        let interval;

        function haptic() {
            if ("vibrate" in navigator) {
                navigator.vibrate(20);
            }
        }

        function updateDisplay() {
            if (!startTime) {
                timerDisplay.textContent = "00:00:00";
                statusDisplay.textContent = "待机中";
                statusDisplay.classList.remove('active');
                toggleBtn.textContent = "开始";
                toggleBtn.classList.remove('stop');
                clearInterval(interval);
                return;
            }

            const now = new Date().getTime();
            const diff = now - parseInt(startTime);
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            timerDisplay.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            statusDisplay.textContent = "断食中";
            statusDisplay.classList.add('active');
            toggleBtn.textContent = "结束";
            toggleBtn.classList.add('stop');
        }

        function deleteItem(index) {
            haptic();
            history.splice(index, 1);
            localStorage.setItem('fastHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-item"><span class="history-date" style="color: #8e8e93">暂无记录</span></div>';
                return;
            }
            
            historyList.innerHTML = '';
            history.slice().reverse().forEach((item, revIdx) => {
                const idx = history.length - 1 - revIdx;
                const wrapper = document.createElement('div');
                wrapper.className = 'history-row-wrapper';
                wrapper.innerHTML = `
                    <div class="delete-btn" onclick="deleteItem(${idx})">删除</div>
                    <div class="history-item" id="item-${idx}">
                        <span class="history-date">${new Date(item.end).toLocaleDateString('zh-CN', {month: 'short', day: 'numeric', weekday: 'short'})}</span>
                        <span class="history-duration">${item.duration}</span>
                    </div>
                `;
                
                const itemEl = wrapper.querySelector('.history-item');
                let startX = 0;
                let currentX = 0;

                itemEl.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                }, {passive: true});

                itemEl.addEventListener('touchmove', (e) => {
                    currentX = e.touches[0].clientX;
                    const diff = startX - currentX;
                    if (diff > 0 && diff < 110) {
                        itemEl.style.transform = `translateX(-${diff}px)`;
                    }
                }, {passive: true});

                itemEl.addEventListener('touchend', (e) => {
                    const diff = startX - currentX;
                    if (diff > 45) {
                        wrapper.classList.add('swiped');
                        itemEl.style.transform = `translateX(-90px)`;
                    } else {
                        wrapper.classList.remove('swiped');
                        itemEl.style.transform = `translateX(0)`;
                    }
                });

                historyList.appendChild(wrapper);
            });
        }

        toggleBtn.onclick = () => {
            haptic();
            if (startTime) {
                const duration = timerDisplay.textContent;
                history.push({ end: new Date().getTime(), duration });
                localStorage.setItem('fastHistory', JSON.stringify(history));
                localStorage.removeItem('fastStartTime');
                startTime = null;
            } else {
                startTime = new Date().getTime().toString();
                localStorage.setItem('fastStartTime', startTime);
                interval = setInterval(updateDisplay, 1000);
            }
            updateDisplay();
            renderHistory();
        };

        if (startTime) {
            interval = setInterval(updateDisplay, 1000);
            updateDisplay();
        }
        renderHistory();
    </script>
</body>
</html>
