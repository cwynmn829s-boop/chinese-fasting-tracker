<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="断食计时器">
    <meta name="theme-color" content="#F2F2F7">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=4">
    <link rel="manifest" href="manifest.json">
    <title>断食计时器</title>
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-group-bg: #FFFFFF;
            --ios-label: #000000;
            --ios-secondary-label: #8E8E93;
            --ios-separator: #C6C6C8;
            --ios-accent: #34C759;
            --ios-danger: #FF3B30;
            --glass: rgba(255, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-label);
            margin: 0;
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body::-webkit-scrollbar { display: none; }

        .header { width: 100%; padding: 34px 4px 12px; }
        h1 { font-size: 34px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }

        .main-widget {
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 0.5px solid rgba(0, 0, 0, 0.05);
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .protocol-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            width: 100%;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        .protocol-selector::-webkit-scrollbar { display: none; }
        .protocol-chip {
            padding: 6px 12px;
            background: rgba(0,0,0,0.05);
            border-radius: 12px;
            font-size: 13px;
            white-space: nowrap;
            color: var(--ios-secondary-label);
        }
        .protocol-chip.active {
            background: var(--ios-accent);
            color: white;
        }

        .stage-info {
            font-size: 14px;
            color: var(--ios-accent);
            font-weight: 600;
            margin-bottom: 8px;
            height: 20px;
        }

        .timer { font-size: 56px; font-weight: 200; font-variant-numeric: tabular-nums; margin-bottom: 24px; letter-spacing: -1.5px; }

        .action-btn {
            background: var(--ios-accent);
            color: white;
            border: none;
            width: 72px;
            height: 72px;
            border-radius: 36px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.2);
        }
        .action-btn.stop { background: var(--ios-danger); box-shadow: 0 4px 12px rgba(255, 59, 48, 0.2); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            margin-top: 24px;
        }
        .stat-card {
            background: white;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-val { font-size: 18px; font-weight: 700; color: var(--ios-accent); display: block; }
        .stat-lab { font-size: 10px; color: var(--ios-secondary-label); margin-top: 4px; }

        .tool-section { width: 100%; max-width: 400px; margin-top: 24px; }
        .section-title { font-size: 13px; color: var(--ios-secondary-label); text-transform: uppercase; margin-bottom: 8px; padding-left: 16px; }
        
        .tool-card {
            background: var(--ios-group-bg);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .water-controls { display: flex; align-items: center; gap: 12px; }
        .water-btn { width: 32px; height: 32px; border-radius: 16px; border: none; background: #E5F6FF; color: #007AFF; font-size: 18px; }
        
        .weight-input { border: none; background: #F2F2F7; padding: 8px 12px; border-radius: 8px; width: 80px; text-align: center; font-size: 16px; outline: none; }

        .history-list { background: var(--ios-group-bg); border-radius: 12px; overflow: hidden; }
        .history-row-wrapper { position: relative; overflow: hidden; background-color: var(--ios-danger); }
        .history-item { background: var(--ios-group-bg); display: flex; justify-content: space-between; padding: 14px 16px; position: relative; z-index: 2; transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .delete-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: var(--ios-danger); color: white; display: flex; justify-content: center; align-items: center; z-index: 1; }
        .swiped .history-item { transform: translateX(-80px); }
    </style>
</head>
<body>
    <div class="header"><h1>断食计时器</h1></div>

    <div class="main-widget">
        <div class="protocol-selector" id="protocolList">
            <div class="protocol-chip active" data-hours="16">16:8</div>
            <div class="protocol-chip" data-hours="18">18:6</div>
            <div class="protocol-chip" data-hours="20">20:4</div>
            <div class="protocol-chip" data-hours="0">自定义</div>
        </div>
        <div id="stage" class="stage-info">血糖下降</div>
        <div id="timer" class="timer">00:00:00</div>
        <button id="toggleBtn" class="action-btn">开始</button>

        <div class="stats-grid">
            <div class="stat-card"><span class="stat-val" id="statTotal">0</span><span class="stat-lab">总小时</span></div>
            <div class="stat-card"><span class="stat-val" id="statStreak">0</span><span class="stat-lab">连续天数</span></div>
            <div class="stat-card"><span class="stat-val" id="statRate">0%</span><span class="stat-lab">完成率</span></div>
        </div>
    </div>

    <div class="tool-section">
        <div class="section-title">饮水追踪</div>
        <div class="tool-card">
            <span>今日饮水 (<span id="waterCount">0</span> 杯)</span>
            <div class="water-controls">
                <button class="water-btn" id="waterSub">-</button>
                <button class="water-btn" id="waterAdd">+</button>
            </div>
        </div>
    </div>

    <div class="tool-section">
        <div class="section-title">体重记录 (公斤)</div>
        <div class="tool-card">
            <span>当前体重</span>
            <input type="number" step="0.1" class="weight-input" id="weightInput" placeholder="0.0">
        </div>
    </div>

    <div class="tool-section">
        <div class="section-title">最近记录</div>
        <div class="history-list" id="historyList"></div>
    </div>

    <script>
        let startTime = localStorage.getItem('fastStartTime');
        let history = JSON.parse(localStorage.getItem('fastHistory') || '[]');
        let water = parseInt(localStorage.getItem('waterCount') || '0');
        let weight = localStorage.getItem('lastWeight') || '';
        let protocol = parseInt(localStorage.getItem('fastProtocol') || '16');
        let interval;

        const timerDisplay = document.getElementById('timer');
        const stageDisplay = document.getElementById('stage');
        const toggleBtn = document.getElementById('toggleBtn');
        const waterCount = document.getElementById('waterCount');
        const weightInput = document.getElementById('weightInput');
        const historyList = document.getElementById('historyList');

        function haptic() { if ("vibrate" in navigator) navigator.vibrate(10); }

        function getStage(hours) {
            if (hours < 12) return "血糖下降 / 胰岛素降低";
            if (hours < 18) return "脂肪燃烧 / 酮体产生";
            if (hours < 24) return "细胞自噬 / 深层修复";
            return "生长激素分泌 / 免疫重塑";
        }

        function updateDisplay() {
            if (!startTime) {
                timerDisplay.textContent = "00:00:00";
                stageDisplay.textContent = "准备开始";
                toggleBtn.textContent = "开始";
                toggleBtn.classList.remove('stop');
                clearInterval(interval);
                return;
            }

            const now = new Date().getTime();
            const diff = now - parseInt(startTime);
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            timerDisplay.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            stageDisplay.textContent = getStage(hours);
            toggleBtn.textContent = "结束";
            toggleBtn.classList.add('stop');
        }

        function renderStats() {
            const totalHours = history.reduce((acc, item) => acc + parseFloat(item.duration || 0), 0).toFixed(1);
            document.getElementById('statTotal').textContent = totalHours;
            document.getElementById('statStreak').textContent = history.length > 0 ? "1" : "0"; // Simplified streak logic
            const rate = protocol > 0 ? (history.filter(h => parseFloat(h.duration) >= protocol).length / (history.length || 1) * 100).toFixed(0) : 100;
            document.getElementById('statRate').textContent = rate + "%";
        }

        function renderHistory() {
            historyList.innerHTML = history.length ? '' : '<div class="history-item" style="color:#8e8e93">暂无记录</div>';
            history.slice().reverse().forEach((item, revIdx) => {
                const idx = history.length - 1 - revIdx;
                const wrapper = document.createElement('div');
                wrapper.className = 'history-row-wrapper';
                wrapper.innerHTML = `<div class="delete-btn" onclick="deleteItem(${idx})">删除</div>
                    <div class="history-item"><span>${new Date(item.end).toLocaleDateString('zh-CN')}</span><span>${item.duration}小时</span></div>`;
                
                const itemEl = wrapper.querySelector('.history-item');
                let startX = 0;
                itemEl.addEventListener('touchstart', (e) => startX = e.touches[0].clientX);
                itemEl.addEventListener('touchend', (e) => {
                    if (startX - e.changedTouches[0].clientX > 50) wrapper.classList.add('swiped');
                    else wrapper.classList.remove('swiped');
                });
                historyList.appendChild(wrapper);
            });
        }

        function deleteItem(idx) { haptic(); history.splice(idx, 1); localStorage.setItem('fastHistory', JSON.stringify(history)); renderHistory(); renderStats(); }

        toggleBtn.onclick = () => {
            haptic();
            if (startTime) {
                const diff = new Date().getTime() - parseInt(startTime);
                const duration = (diff / (1000 * 60 * 60)).toFixed(1);
                history.push({ end: new Date().getTime(), duration });
                localStorage.setItem('fastHistory', JSON.stringify(history));
                localStorage.removeItem('fastStartTime');
                startTime = null;
            } else {
                startTime = new Date().getTime().toString();
                localStorage.setItem('fastStartTime', startTime);
                interval = setInterval(updateDisplay, 1000);
            }
            updateDisplay(); renderHistory(); renderStats();
        };

        document.getElementById('waterAdd').onclick = () => { haptic(); water++; updateWater(); };
        document.getElementById('waterSub').onclick = () => { haptic(); if(water>0) water--; updateWater(); };
        function updateWater() { waterCount.textContent = water; localStorage.setItem('waterCount', water); }

        weightInput.value = weight;
        weightInput.onchange = (e) => { weight = e.target.value; localStorage.setItem('lastWeight', weight); haptic(); };

        document.querySelectorAll('.protocol-chip').forEach(chip => {
            if(parseInt(chip.dataset.hours) === protocol) chip.classList.add('active');
            chip.onclick = () => {
                haptic();
                document.querySelectorAll('.protocol-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                protocol = parseInt(chip.dataset.hours);
                localStorage.setItem('fastProtocol', protocol);
                renderStats();
            };
        });

        if (startTime) { interval = setInterval(updateDisplay, 1000); updateDisplay(); }
        updateWater(); renderHistory(); renderStats();
    </script>
</body>
</html>
