<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>翡翠断食 | Emerald Fasting</title>
    
    <!-- PWA & iOS Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="翡翠断食">
    <link rel="apple-touch-icon" href="https://img.icons8.com/glassmorphism/512/emerald.png">
    <link rel="manifest" href="manifest.json?v=400">
    <meta name="theme-color" content="#064e3b">

    <style>
        :root {
            --emerald-glass: rgba(6, 78, 59, 0.4);
            --emerald-glow: #10b981;
            --text-main: #ecfdf5;
            --text-dim: #a7f3d0;
            --spring-easing: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ios-transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #022c22;
            color: var(--text-main);
            overflow: hidden; /* Prevent iOS dual scroll */
        }

        /* App Wrapper for Internal Scrolling */
        #app-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Background Visuals */
        .bg-mesh {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 30%, #064e3b 0%, transparent 40%),
                        radial-gradient(circle at 70% 60%, #065f46 0%, transparent 40%);
            z-index: -1;
            filter: blur(80px);
            opacity: 0.6;
        }

        /* Navigation Bar */
        nav {
            height: 84px;
            background: rgba(6, 78, 59, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dim);
            font-size: 10px;
            text-decoration: none;
            transition: transform 0.2s var(--spring-easing), color 0.3s ease;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--emerald-glow);
            transform: translateY(-4px) scale(1.1);
        }

        .nav-item i {
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* Main Content Area */
        main {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 20px;
            padding-top: env(safe-area-inset-top);
            position: relative;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s var(--ios-transition);
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glass Cards */
        .glass-card {
            background: var(--emerald-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 0.5px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: transform 0.2s var(--spring-easing);
        }

        .glass-card:active {
            transform: scale(0.98);
        }

        /* Tablet Layout (OnePlus Pad 7:5) */
        @media (min-width: 800px) and (orientation: landscape) {
            main {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 24px;
                padding: 40px;
            }
            .full-width { grid-column: span 2; }
        }

        /* Timer UI */
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
            position: relative;
        }

        .timer-ring {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: 4px solid rgba(16, 185, 129, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.2);
        }

        .timer-ring::after {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 2px solid var(--emerald-glow);
            clip-path: inset(0 0 50% 0); /* Mock progress */
            filter: drop-shadow(0 0 10px var(--emerald-glow));
        }

        .timer-value {
            font-size: 42px;
            font-weight: 200;
            letter-spacing: -1px;
        }

        /* Buttons & Toggles */
        .btn-premium {
            background: var(--emerald-glow);
            color: #022c22;
            border: none;
            border-radius: 16px;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            transition: all 0.2s var(--spring-easing);
            cursor: pointer;
        }

        .btn-premium:active {
            transform: scale(0.92);
            filter: brightness(1.1);
        }

        /* HARD-CODED MOCK DATA STYLES */
        .stage-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 0.5px solid rgba(255,255,255,0.05);
        }
        .stage-icon {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--emerald-glow);
            box-shadow: 0 0 8px var(--emerald-glow);
        }
        .article-bento {
            height: 160px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }
        .article-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            align-items: flex-end;
            padding: 15px;
        }

        /* Progress Visuals */
        .chart-mock {
            height: 120px;
            width: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(16, 185, 129, 0.1) 50%, transparent 100%);
            border-bottom: 2px solid var(--emerald-glow);
            position: relative;
            mask-image: linear-gradient(to top, black, transparent);
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    
    <div id="app-wrapper">
        <main id="main-content">
            <!-- DASHBOARD TAB -->
            <div id="tab-dashboard" class="tab-content active">
                <div class="glass-card full-width" style="text-align: center;">
                    <h2 style="font-weight: 300; margin: 0;">正在断食</h2>
                    <p style="color: var(--text-dim); margin: 4px 0 20px;">16:8 方案 · 进行中</p>
                    <div class="timer-container">
                        <div class="timer-ring">
                            <div class="timer-value">14:22:55</div>
                        </div>
                    </div>
                    <button class="btn-premium" onclick="hapticPulse()">结束断食</button>
                </div>
                
                <div class="glass-card">
                    <h3>生理阶段</h3>
                    <div class="stage-indicator">
                        <div class="stage-icon"></div>
                        <div>
                            <div style="font-size: 14px;">血糖下降</div>
                            <div style="font-size: 12px; color: var(--text-dim);">胰岛素水平开始降低</div>
                        </div>
                    </div>
                    <div class="stage-indicator">
                        <div class="stage-icon" style="opacity: 0.3;"></div>
                        <div style="opacity: 0.5;">
                            <div style="font-size: 14px;">脂肪燃烧</div>
                            <div style="font-size: 12px;">预计 2小时 40分 后</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- JOURNEY TAB -->
            <div id="tab-journey" class="tab-content">
                <h2 style="font-weight: 300;">断食旅程</h2>
                <div class="glass-card">
                    <h3>本周回顾</h3>
                    <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                        <div style="text-align: center;"><div style="font-size: 20px;">5</div><div style="font-size: 10px; color: var(--text-dim);">天数</div></div>
                        <div style="text-align: center;"><div style="font-size: 20px;">82h</div><div style="font-size: 10px; color: var(--text-dim);">总时长</div></div>
                        <div style="text-align: center;"><div style="font-size: 20px;">14h</div><div style="font-size: 10px; color: var(--text-dim);">最长</div></div>
                    </div>
                </div>
                <div class="glass-card">
                    <h3>代谢里程碑</h3>
                    <p style="font-size: 14px; color: var(--text-dim);">您已通过断食累计修复细胞 120 小时</p>
                    <div class="chart-mock"></div>
                </div>
            </div>

            <!-- LIBRARY TAB -->
            <div id="tab-library" class="tab-content">
                <h2 style="font-weight: 300;">健康百科</h2>
                <div class="glass-card article-bento" style="background-image: url('https://images.unsplash.com/photo-1547514701-42782101795e?auto=format&fit=crop&w=800&q=80');">
                    <div class="article-overlay">
                        <div>
                            <div style="font-size: 10px; text-transform: uppercase; color: var(--emerald-glow);">科学研究</div>
                            <div style="font-size: 18px; font-weight: 600;">自噬反应：身体的自我清理</div>
                        </div>
                    </div>
                </div>
                <div class="glass-card article-bento" style="background-image: url('https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=800&q=80');">
                    <div class="article-overlay">
                        <div>
                            <div style="font-size: 10px; text-transform: uppercase; color: var(--emerald-glow);">新手入门</div>
                            <div style="font-size: 18px; font-weight: 600;">16:8 方案的第一个月</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PROFILE TAB -->
            <div id="tab-profile" class="tab-content">
                <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
                    <div style="width: 64px; height: 64px; border-radius: 50%; background: var(--emerald-glass); border: 2px solid var(--emerald-glow); display: flex; align-items: center; justify-content: center; font-size: 24px;">👤</div>
                    <div>
                        <div style="font-size: 20px; font-weight: 600;">断食勇士</div>
                        <div style="font-size: 14px; color: var(--text-dim);">翡翠会员 · 第 42 天</div>
                    </div>
                </div>
                <div class="glass-card">
                    <h3>体重趋势</h3>
                    <div style="font-size: 28px; font-weight: 200; margin-bottom: 10px;">72.5 <span style="font-size: 14px;">kg</span></div>
                    <div class="chart-mock" style="height: 60px;"></div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="glass-card" style="text-align: center;">
                        <div style="font-size: 24px;">🔥 12</div>
                        <div style="font-size: 12px; color: var(--text-dim);">连续天数</div>
                    </div>
                    <div class="glass-card" style="text-align: center;">
                        <div style="font-size: 24px;">🏆 3</div>
                        <div style="font-size: 12px; color: var(--text-dim);">勋章</div>
                    </div>
                </div>
            </div>
        </main>

        <nav>
            <a class="nav-item active" onclick="switchTab('dashboard', this)">
                <i>🏠</i>
                <span>主页</span>
            </a>
            <a class="nav-item" onclick="switchTab('journey', this)">
                <i>📊</i>
                <span>旅程</span>
            </a>
            <a class="nav-item" onclick="switchTab('library', this)">
                <i>📖</i>
                <span>百科</span>
            </a>
            <a class="nav-item" onclick="switchTab('profile', this)">
                <i>👤</i>
                <span>我的</span>
            </a>
        </nav>
    </div>

    <script>
        function switchTab(tabId, el) {
            // Haptic Simulation
            hapticPulse();

            // Nav State
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');

            // Content State
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');

            // Scroll to top
            document.querySelector('main').scrollTop = 0;
        }

        function hapticPulse() {
            if ('vibrate' in navigator) {
                navigator.vibrate(10);
            }
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=400').then(reg => {
                    console.log('SW v400 Active');
                });
            });
        }

        // Prevent Pull-to-refresh on iOS
        document.body.addEventListener('touchmove', function(e) {
            if (e.target.closest('main')) return;
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
