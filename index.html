<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>断食追踪器 - Emerald Pro</title>
    <link rel="manifest" href="manifest.json?v=600">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --emerald-primary: #10b981;
            --emerald-secondary: #059669;
            --emerald-bg: #f0fdf4;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #064e3b;
            --text-dim: #065f46;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --spring: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #ffffff 0%, #f0fdf4 100%);
            color: var(--text-main);
        }

        #app-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* Nav Tabs */
        #nav-tabs {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            height: 64px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: var(--shadow);
            z-index: 1000;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.5;
            transition: var(--transition);
            cursor: pointer;
        }

        .tab-item.active {
            opacity: 1;
            transform: scale(1.1);
        }

        .tab-item svg {
            width: 24px;
            height: 24px;
            stroke: var(--emerald-primary);
            stroke-width: 1.5;
            fill: none;
        }

        .tab-item span {
            font-size: 10px;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Content Sections */
        .section {
            display: none;
            padding: 60px 20px 120px;
            animation: fadeIn 0.4s ease-out;
            min-height: 100vh;
        }

        .section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dashboard */
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .timer-ring {
            position: relative;
            width: 280px;
            height: 280px;
            background: var(--glass-bg);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
        }

        .timer-ring svg.progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
        }

        .timer-time {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--emerald-primary);
        }

        .timer-label {
            font-size: 14px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .timer-controls {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .btn {
            padding: 14px 40px;
            border-radius: 20px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--spring);
            box-shadow: var(--shadow);
        }

        .btn:active { transform: scale(0.92); }

        .btn-primary { background: var(--emerald-primary); color: #fff; }
        .btn-secondary { background: var(--glass-bg); backdrop-filter: blur(10px); color: var(--emerald-primary); border: 1px solid var(--glass-border); }

        /* Bento Grid */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 32px;
        }

        .bento-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .full-width { grid-column: span 2; }

        /* Tablet Layout (7:5) */
        @media (min-width: 768px) and (orientation: landscape) {
            #app-wrapper {
                flex-direction: row;
            }
            .section {
                max-width: 1200px;
                margin: 0 auto;
                padding-top: 40px;
            }
            .dashboard-main {
                display: grid;
                grid-template-columns: 1fr 1.2fr;
                gap: 40px;
                align-items: start;
            }
            .timer-container { margin-top: 0; }
        }

        /* Modals & Drawers */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: flex-end;
        }

        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            width: 100%;
            max-width: 500px;
            padding: 32px;
            border-radius: 32px 32px 0 0;
            border-top: 1px solid var(--glass-border);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .modal.active { display: flex; }
        .modal.active .modal-content { transform: translateY(0); }

        /* Grid */
        .grid-circles {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 16px;
        }
        .circle {
            width: 100%;
            padding-bottom: 100%;
            border-radius: 50%;
            background: var(--emerald-bg);
        }
        .circle.active { background: var(--emerald-primary); box-shadow: 0 0 10px var(--emerald-primary); }

        h2, h3 { margin-top: 0; font-weight: 700; letter-spacing: -0.5px; color: var(--text-main); }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <!-- Dashboard Section -->
        <section id="dashboard" class="section active">
            <div class="dashboard-main">
                <div class="timer-container">
                    <h2>当前状态</h2>
                    <div class="timer-ring">
                        <svg class="progress-ring" width="280" height="280">
                            <circle stroke="#f0fdf4" stroke-width="12" fill="transparent" r="130" cx="140" cy="140"/>
                            <circle id="timer-progress" stroke="#10b981" stroke-width="12" stroke-linecap="round" fill="transparent" r="130" cx="140" cy="140" stroke-dasharray="816.8" stroke-dashoffset="816.8"/>
                        </svg>
                        <div class="timer-time" id="display-time">16:00:00</div>
                        <div class="timer-label" id="timer-status">正在准备</div>
                    </div>
                    <div class="timer-controls">
                        <button class="btn btn-primary" onclick="toggleTimer()" id="main-btn">启动</button>
                        <button class="btn btn-secondary" onclick="openPlanPicker()">更换计划</button>
                    </div>
                </div>

                <div class="bento-grid">
                    <div class="bento-card full-width">
                        <h3>生理阶段</h3>
                        <p id="bio-stage" style="color:var(--text-dim); margin:0;">断食初期：身体开始消耗糖原，胰岛素水平逐渐下降。</p>
                    </div>
                    <div class="bento-card">
                        <h3>目标</h3>
                        <span id="target-plan">16:8</span>
                    </div>
                    <div class="bento-card">
                        <h3>已坚持</h3>
                        <span>4 天</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Journey Section -->
        <section id="journey" class="section">
            <h2>健康旅程</h2>
            <div class="bento-grid">
                <div class="bento-card full-width">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3>体重趋势</h3>
                        <button class="btn btn-secondary" style="padding:8px 16px; font-size:14px;" onclick="openWeightModal()">记录</button>
                    </div>
                    <canvas id="weightChart" style="width:100%; height:200px; margin-top:16px;"></canvas>
                </div>
                <div class="bento-card full-width">
                    <h3>身体变化里程碑</h3>
                    <div style="margin-top:12px; font-size:14px;">
                        <div style="margin-bottom:8px;">✅ 12h - 开始产生酮体</div>
                        <div style="margin-bottom:8px;">⏳ 18h - 脂肪氧化峰值</div>
                        <div>⏳ 24h - 细胞自噬开始</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Library Section -->
        <section id="library" class="section">
            <h2>百科全书</h2>
            <div class="bento-grid">
                <div class="bento-card full-width">
                    <h4 style="margin:0 0 8px;">什么是 16:8 断食？</h4>
                    <p style="margin:0; font-size:14px; opacity:0.8;">最受欢迎的断食方法，8小时进食，16小时禁食...</p>
                </div>
                <div class="bento-card">
                    <h4 style="margin:0 0 8px;">补水指南</h4>
                    <p style="margin:0; font-size:14px; opacity:0.8;">黑咖啡与茶是否打破断食？</p>
                </div>
                <div class="bento-card">
                    <h4 style="margin:0 0 8px;">电解质补充</h4>
                    <p style="margin:0; font-size:14px; opacity:0.8;">如何缓解断食初期的头痛？</p>
                </div>
            </div>
        </section>

        <!-- Profile Section -->
        <section id="profile" class="section">
            <h2>个人中心</h2>
            <div class="bento-grid">
                <div class="bento-card full-width">
                    <h3>连续天数网格</h3>
                    <div class="grid-circles">
                        <div class="circle active"></div><div class="circle active"></div><div class="circle active"></div><div class="circle active"></div>
                        <div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div>
                        <div class="circle"></div><div class="circle"></div><div class="circle"></div><div class="circle"></div>
                        <div class="circle"></div><div class="circle"></div>
                    </div>
                </div>
                <div class="bento-card full-width">
                    <h3>设置</h3>
                    <div style="margin-top:10px;">通知提醒、健康应用同步...</div>
                </div>
            </div>
        </section>

        <!-- Modals -->
        <div id="planPicker" class="modal">
            <div class="modal-content">
                <h3>选择断食计划</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px;">
                    <button class="btn btn-secondary" onclick="setPlan(16)">16:8</button>
                    <button class="btn btn-secondary" onclick="setPlan(18)">18:6</button>
                    <button class="btn btn-secondary" onclick="setPlan(20)">20:4</button>
                    <button class="btn btn-secondary" onclick="setPlan(23)">23:1 (OMAD)</button>
                </div>
                <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="closeModals()">关闭</button>
            </div>
        </div>

        <div id="weightModal" class="modal">
            <div class="modal-content">
                <h3>记录今日体重</h3>
                <input type="number" id="weightInput" placeholder="kg" style="width:100%; padding:16px; border-radius:16px; border:1px solid var(--glass-border); background:var(--emerald-bg); font-size:20px; text-align:center; margin:20px 0;">
                <button class="btn btn-primary" style="width:100%;" onclick="logWeight()">确认记录</button>
                <button class="btn btn-secondary" style="width:100%; margin-top:12px;" onclick="closeModals()">取消</button>
            </div>
        </div>

        <!-- Navigation -->
        <nav id="nav-tabs">
            <div class="tab-item active" onclick="showTab('dashboard')">
                <svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                <span>主页</span>
            </div>
            <div class="tab-item" onclick="showTab('journey')">
                <svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg>
                <span>旅程</span>
            </div>
            <div class="tab-item" onclick="showTab('library')">
                <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5V4.5z"/></svg>
                <span>百科</span>
            </div>
            <div class="tab-item" onclick="showTab('profile')">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg>
                <span>我的</span>
            </div>
        </nav>
    </div>

    <script>
        let timerSeconds = 16 * 3600;
        let currentSeconds = timerSeconds;
        let isRunning = false;
        let interval;

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'journey') initChart();
        }

        function toggleTimer() {
            const btn = document.getElementById('main-btn');
            const status = document.getElementById('timer-status');
            if (isRunning) {
                clearInterval(interval);
                btn.innerText = '启动';
                status.innerText = '已暂停';
            } else {
                interval = setInterval(updateTimer, 1000);
                btn.innerText = '暂停';
                status.innerText = '正在断食';
            }
            isRunning = !isRunning;
            if (window.navigator.vibrate) window.navigator.vibrate(20);
        }

        function updateTimer() {
            if (currentSeconds > 0) {
                currentSeconds--;
                renderTimer();
            } else {
                clearInterval(interval);
                alert('断食完成！');
            }
        }

        function renderTimer() {
            const h = Math.floor(currentSeconds / 3600);
            const m = Math.floor((currentSeconds % 3600) / 60);
            const s = currentSeconds % 60;
            document.getElementById('display-time').innerText = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            
            const ring = document.getElementById('timer-progress');
            const total = 816.8;
            const offset = total - (currentSeconds / timerSeconds) * total;
            ring.style.strokeDashoffset = offset;
        }

        function openPlanPicker() { document.getElementById('planPicker').classList.add('active'); }
        function openWeightModal() { document.getElementById('weightModal').classList.add('active'); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }

        function setPlan(hours) {
            timerSeconds = hours * 3600;
            currentSeconds = timerSeconds;
            document.getElementById('target-plan').innerText = `${hours}:${24-hours}`;
            renderTimer();
            closeModals();
        }

        function logWeight() {
            const val = document.getElementById('weightInput').value;
            if(val) {
                alert(`已记录: ${val} kg`);
                closeModals();
                initChart();
            }
        }

        function initChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
                    datasets: [{
                        label: '体重 (kg)',
                        data: [72.5, 72.3, 72.1, 72.0, 71.8, 71.9, 71.6],
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false } } }
            });
        }
    </script>
</body>
</html>
