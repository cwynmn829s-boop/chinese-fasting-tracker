<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="断食计时器">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="https://img.icons8.com/plasticine/512/apple-health.png">
    <link rel="manifest" href="manifest.json">
    <title>断食计时器</title>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.05);
            --accent: #34c759; /* Green Theme */
            --text-main: #000000;
            --text-secondary: #8e8e93;
            --danger: #ff3b30;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
            background-color: var(--ios-bg);
            background-image: radial-gradient(circle at 50% -20%, #ffffff 0%, #f2f2f7 100%);
            color: var(--text-main);
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 40px 0 20px;
            text-align: left;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .main-widget {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 38px;
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            animation: scaleIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .status-pill {
            background: rgba(0, 0, 0, 0.05);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .status-pill.active {
            color: var(--accent);
            background: rgba(52, 199, 89, 0.1);
        }

        .timer {
            font-size: 64px;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            margin-bottom: 40px;
            letter-spacing: -2px;
        }

        .action-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(52, 199, 89, 0.2);
        }

        .action-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .action-btn.stop {
            background: var(--danger);
            box-shadow: 0 8px 20px rgba(255, 59, 48, 0.2);
        }

        .history-section {
            width: 100%;
            max-width: 400px;
            margin-top: 40px;
            animation: fadeInUp 0.8s ease-out;
        }

        .history-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-left: 10px;
        }

        .history-container {
            border-radius: 24px;
            overflow: hidden;
            background: var(--glass);
            border: 1px solid var(--glass-border);
        }

        .history-item-wrapper {
            position: relative;
            overflow: hidden;
            background: var(--danger);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .history-item-wrapper:last-child {
            border-bottom: none;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: white;
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.15);
            position: relative;
            z-index: 2;
            cursor: grab;
        }

        .delete-btn {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 80px;
            background: var(--danger);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            z-index: 1;
            cursor: pointer;
        }

        .history-date {
            font-size: 16px;
            font-weight: 400;
        }

        .history-duration {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>断食计时器</h1>
    </div>

    <div class="main-widget">
        <div id="status" class="status-pill">等待中</div>
        <div id="timer" class="timer">00:00:00</div>
        <button id="toggleBtn" class="action-btn">开始</button>
    </div>

    <div class="history-section">
        <div class="history-header">最近记录</div>
        <div class="history-container" id="historyList">
            <!-- Items injected by JS -->
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }

        let startTime = localStorage.getItem('fastStartTime');
        let history = JSON.parse(localStorage.getItem('fastHistory') || '[]');
        const timerDisplay = document.getElementById('timer');
        const statusDisplay = document.getElementById('status');
        const toggleBtn = document.getElementById('toggleBtn');
        const historyList = document.getElementById('historyList');
        let interval;

        function hapticFeedback() {
            if (navigator.vibrate) {
                navigator.vibrate(15);
            }
        }

        function updateDisplay() {
            if (!startTime) {
                timerDisplay.textContent = "00:00:00";
                statusDisplay.textContent = "等待中";
                statusDisplay.classList.remove('active');
                toggleBtn.textContent = "开始";
                toggleBtn.classList.remove('stop');
                clearInterval(interval);
                return;
            }

            const now = new Date().getTime();
            const diff = now - parseInt(startTime);
            
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            timerDisplay.textContent = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            statusDisplay.textContent = "断食中";
            statusDisplay.classList.add('active');
            toggleBtn.textContent = "停止";
            toggleBtn.classList.add('stop');
        }

        function deleteHistoryItem(index) {
            hapticFeedback();
            history.splice(index, 1);
            localStorage.setItem('fastHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<div style="padding: 20px; text-align: center; color: #8e8e93;">暂无记录</div>';
                return;
            }
            
            historyList.innerHTML = '';
            // Display last 5 items
            const displayHistory = [...history].reverse().slice(0, 5);
            
            displayHistory.forEach((item, revIndex) => {
                const originalIndex = history.length - 1 - revIndex;
                const wrapper = document.createElement('div');
                wrapper.className = 'history-item-wrapper';
                
                wrapper.innerHTML = `
                    <div class="delete-btn" onclick="deleteHistoryItem(${originalIndex})">删除</div>
                    <div class="history-item" id="item-${originalIndex}">
                        <span class="history-date">${new Date(item.end).toLocaleDateString('zh-CN', {month: 'short', day: 'numeric'})}</span>
                        <span class="history-duration">${item.duration}</span>
                    </div>
                `;
                
                const element = wrapper.querySelector('.history-item');
                let startX = 0;
                let currentTranslate = 0;

                element.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    element.style.transition = 'none';
                });

                element.addEventListener('touchmove', (e) => {
                    const diff = e.touches[0].clientX - startX;
                    if (diff < 0) { // Swipe left
                        currentTranslate = Math.max(diff, -80);
                        element.style.transform = `translateX(${currentTranslate}px)`;
                    } else if (currentTranslate < 0) { // Swipe right to close
                        currentTranslate = Math.min(diff - 80, 0);
                        element.style.transform = `translateX(${currentTranslate}px)`;
                    }
                });

                element.addEventListener('touchend', () => {
                    element.style.transition = 'transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.15)';
                    if (currentTranslate < -40) {
                        currentTranslate = -80;
                        hapticFeedback();
                    } else {
                        currentTranslate = 0;
                    }
                    element.style.transform = `translateX(${currentTranslate}px)`;
                });

                historyList.appendChild(wrapper);
            });
        }

        toggleBtn.onclick = () => {
            hapticFeedback();
            if (startTime) {
                const duration = timerDisplay.textContent;
                history.push({ end: new Date().getTime(), duration });
                localStorage.setItem('fastHistory', JSON.stringify(history));
                localStorage.removeItem('fastStartTime');
                startTime = null;
                renderHistory();
            } else {
                startTime = new Date().getTime().toString();
                localStorage.setItem('fastStartTime', startTime);
                interval = setInterval(updateDisplay, 1000);
            }
            updateDisplay();
        };

        if (startTime) {
            interval = setInterval(updateDisplay, 1000);
            updateDisplay();
        }
        renderHistory();
    </script>
</body>
</html>
