<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="断食计时器">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="https://img.icons8.com/plasticine/512/apple-health.png">
    <link rel="manifest" href="manifest.json">
    <title>断食计时器</title>
    <style>
        :root {
            --ios-bg: #000000;
            --glass: rgba(28, 28, 30, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #5e5ce6;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --danger: #ff453a;
            --success: #32d74b;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
            background-color: var(--ios-bg);
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e 0%, #000000 100%);
            color: var(--text-main);
            margin: 0;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 40px 0 20px;
            text-align: left;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 34px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .main-widget {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 38px;
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: scaleIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .status-pill {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }

        .status-pill.active {
            color: var(--accent);
            background: rgba(94, 92, 230, 0.15);
        }

        .timer {
            font-size: 64px;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            margin-bottom: 40px;
            letter-spacing: -2px;
        }

        .action-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s, box-shadow 0.3s;
            display: flex;
            justify(center): center;
            align-items: center;
            box-shadow: 0 0 20px rgba(94, 92, 230, 0.3);
        }

        .action-btn:active {
            transform: scale(0.92);
        }

        .action-btn.stop {
            background: var(--danger);
            box-shadow: 0 0 20px rgba(255, 69, 58, 0.3);
        }

        .history-section {
            width: 100%;
            max-width: 400px;
            margin-top: 40px;
            animation: fadeInUp 0.8s ease-out;
        }

        .history-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-left: 10px;
        }

        .history-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 8px 16px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-date {
            font-size: 16px;
            font-weight: 400;
        }

        .history-duration {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>断食计时器</h1>
    </div>

    <div class="main-widget">
        <div id="status" class="status-pill">Standby</div>
        <div id="timer" class="timer">00:00:00</div>
        <button id="toggleBtn" class="action-btn">Start</button>
    </div>

    <div class="history-section">
        <div class="history-header">最近记录</div>
        <div class="history-card" id="historyList">
            <!-- Items injected by JS -->
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }

        let startTime = localStorage.getItem('fastStartTime');
        let history = JSON.parse(localStorage.getItem('fastHistory') || '[]');
        const timerDisplay = document.getElementById('timer');
        const statusDisplay = document.getElementById('status');
        const toggleBtn = document.getElementById('toggleBtn');
        const historyList = document.getElementById('historyList');
        let interval;

        function updateDisplay() {
            if (!startTime) {
                timerDisplay.textContent = "00:00:00";
                statusDisplay.textContent = "Standby";
                statusDisplay.classList.remove('active');
                toggleBtn.textContent = "Start";
                toggleBtn.classList.remove('stop');
                clearInterval(interval);
                return;
            }

            const now = new Date().getTime();
            const diff = now - parseInt(startTime);
            
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            timerDisplay.textContent = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            statusDisplay.textContent = "Fasting";
            statusDisplay.classList.add('active');
            toggleBtn.textContent = "Stop";
            toggleBtn.classList.add('stop');
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-item"><span class="history-date" style="color: #8e8e93">暂无记录</span></div>';
                return;
            }
            historyList.innerHTML = history.slice(-5).reverse().map(f => `
                <div class="history-item">
                    <span class="history-date">${new Date(f.end).toLocaleDateString('zh-CN', {month: 'short', day: 'numeric'})}</span>
                    <span class="history-duration">${f.duration}</span>
                </div>
            `).join('');
        }

        toggleBtn.onclick = () => {
            if (startTime) {
                const duration = timerDisplay.textContent;
                history.push({ end: new Date().getTime(), duration });
                localStorage.setItem('fastHistory', JSON.stringify(history));
                localStorage.removeItem('fastStartTime');
                startTime = null;
                renderHistory();
            } else {
                startTime = new Date().getTime().toString();
                localStorage.setItem('fastStartTime', startTime);
                interval = setInterval(updateDisplay, 1000);
            }
            updateDisplay();
        };

        if (startTime) {
            interval = setInterval(updateDisplay, 1000);
            updateDisplay();
        }
        renderHistory();
    </script>
</body>
</html>
